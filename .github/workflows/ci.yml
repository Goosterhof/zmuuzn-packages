name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run check --workspaces

  publish:
    name: Publish
    needs: check
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspaces

      - name: Publish to GitHub Packages
        run: |
          for pkg in packages/*/; do
            name=$(node -p "require('./${pkg}package.json').name")
            local_version=$(node -p "require('./${pkg}package.json').version")
            remote_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_version" != "$remote_version" ]; then
              echo "Publishing $name@$local_version (registry has $remote_version)"
              npm publish -w "$pkg"
            else
              echo "Skipping $name@$local_version — already published"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
